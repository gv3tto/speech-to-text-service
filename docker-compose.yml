services:
  model-service:
    build: ./model-service
    ports:
      - "8001:8001"
    volumes:
      - whisper-cache:/root/.cache/whisper
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  orchestration-service:
    build: ./orchestration-service
    ports:
      - "8000:8000"
    environment:
      - MODEL_SERVICE_URL=http://model-service:8001
      - SECRET_KEY=Super-Secret-Key
    depends_on:
      - model-service

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - orchestration-service

volumes:
  whisper-cache: